databaseChangeLog:
  - changeSet:
      id: create-events-table
      author: aleksandrkiselev
      changes:
        - createTable:
            tableName: events
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: organizer_user_id
                  type: UUID
                  remarks: "Ссылка на пользователя-организатора из User Service"
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: event_date
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: start_time
                  type: TIME
                  constraints:
                    nullable: false
              - column:
                  name: end_time
                  type: TIME
              - column:
                  name: location_name
                  type: VARCHAR(255)
              - column:
                  name: address
                  type: VARCHAR(255)
              - column:
                  name: city
                  type: VARCHAR(100)
              - column:
                  name: required_genre
                  type: VARCHAR(100)
              - column:
                  name: duration_minutes
                  type: INT
              - column:
                  name: technical_requirements
                  type: TEXT
              - column:
                  name: reward_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: fixed_fee_amount
                  type: DECIMAL(10,2)
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: 'OPEN'
              - column:
                  name: creation_date
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP