databaseChangeLog:
  - changeSet:
      id: 2-create-applications-table
      author: author
      changes:
        - createTable:
            tableName: applications
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: event_id
                  type: uuid
                  constraints:
                    nullable: false
                    foreignKeyName: fk_applications_event_id
                    references: events(id)
                    deleteCascade: true
              - column:
                  name: artist_user_id
                  type: uuid
                  remarks: "Логическая связь с User Service"
                  constraints:
                    nullable: false
              - column:
                  name: application_date
                  type: timestamp with time zone
                  defaultValueComputed: CURRENT_TIMESTAMP
              - column:
                  name: status
                  type: varchar(50)
                  defaultValue: 'PENDING'
              - column:
                  name: cover_letter
                  type: text
        - addUniqueConstraint:
            tableName: applications
            columnNames: event_id, artist_user_id
            constraintName: uq_event_artist_application